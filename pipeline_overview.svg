<svg viewBox="0 0 720 820" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Network Pharmacology Pipeline</title>
  <desc>Flowchart from raw compound data through ADME, toxicity, target prediction, network analysis, pre-docking, and future docking/MD steps</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ── INPUT ── -->
  <rect x="160" y="12" width="400" height="46" rx="10" fill="#1a1a2e"/>
  <text x="360" y="31" text-anchor="middle" fill="white" font-size="11" font-weight="600">RAW COMPOUND DATA</text>
  <text x="360" y="48" text-anchor="middle" fill="#a0b0cc" font-size="10">GC-MS matrix  ·  Curated compound list</text>

  <line x1="360" y1="58" x2="360" y2="76" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 00 -->
  <rect x="80" y="78" width="560" height="44" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="145" y="97" fill="#3730a3" font-size="10" font-weight="700">00  SETUP</text>
  <text x="145" y="111" fill="#6366f1" font-size="9.5">R packages · project scaffold</text>
  <text x="580" y="104" text-anchor="end" fill="#818cf8" font-size="9" font-style="italic">00_setup/</text>

  <line x1="360" y1="122" x2="360" y2="139" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 01 -->
  <rect x="80" y="141" width="560" height="44" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="145" y="160" fill="#065f46" font-size="10" font-weight="700">01  DATA CLEANING</text>
  <text x="145" y="174" fill="#059669" font-size="9.5">PubChem SMILES retrieval · replicate binarization · Scenario A / B</text>
  <text x="580" y="167" text-anchor="end" fill="#6ee7b7" font-size="9" font-style="italic">01_data_cleaning/</text>

  <line x1="360" y1="185" x2="360" y2="202" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 02 -->
  <rect x="80" y="204" width="560" height="44" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.2"/>
  <text x="145" y="223" fill="#78350f" font-size="10" font-weight="700">02  ADME FILTERING</text>
  <text x="145" y="237" fill="#b45309" font-size="9.5">SwissADME · Lipinski rule-of-five · MW · LogP · HBD · HBA · TPSA</text>
  <text x="580" y="230" text-anchor="end" fill="#fbbf24" font-size="9" font-style="italic">02_adme_filtering/</text>

  <line x1="360" y1="248" x2="360" y2="265" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 03 -->
  <rect x="80" y="267" width="560" height="44" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.2"/>
  <text x="145" y="286" fill="#881337" font-size="10" font-weight="700">03  TOXICITY SCREEN</text>
  <text x="145" y="300" fill="#be123c" font-size="9.5">ADMETlab 2/3 · Ames mutagenicity · DILI · hERG cardiac blockade</text>
  <text x="580" y="293" text-anchor="end" fill="#fb7185" font-size="9" font-style="italic">03_toxicity_filtering/</text>

  <line x1="360" y1="311" x2="360" y2="328" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 04 -->
  <rect x="80" y="330" width="560" height="44" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.2"/>
  <text x="145" y="349" fill="#581c87" font-size="10" font-weight="700">04  TARGET PREDICTION</text>
  <text x="145" y="363" fill="#7c3aed" font-size="9.5">SwissTargetPrediction · SuperPred → Targets&lt;PubChemCID&gt;.csv</text>
  <text x="580" y="356" text-anchor="end" fill="#c084fc" font-size="9" font-style="italic">04_target_prediction/</text>

  <line x1="360" y1="374" x2="360" y2="391" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 05 -->
  <rect x="80" y="393" width="560" height="140" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="145" y="413" fill="#1e3a8a" font-size="10" font-weight="700">05  NETWORK ANALYSIS</text>
  <text x="148" y="430" fill="#1d4ed8" font-size="9">GeneCards disease targets</text>
  <text x="148" y="444" fill="#1d4ed8" font-size="9">Venn: compound ∩ disease</text>
  <text x="148" y="458" fill="#1d4ed8" font-size="9">Network B — compound–target</text>
  <text x="148" y="472" fill="#1d4ed8" font-size="9">Network C — STRING PPI (REST API)</text>
  <text x="148" y="486" fill="#1d4ed8" font-size="9">Topology metrics table</text>
  <text x="148" y="500" fill="#1d4ed8" font-size="9">Network D — hub genes (degree · betweenness · closeness)</text>
  <text x="148" y="514" fill="#1d4ed8" font-size="9">GO / KEGG / Reactome enrichment · Pathview · cnetplot</text>
  <text x="580" y="520" text-anchor="end" fill="#93c5fd" font-size="9" font-style="italic">05_network_analysis/</text>

  <line x1="360" y1="533" x2="360" y2="550" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 06 -->
  <rect x="80" y="552" width="560" height="120" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="145" y="572" fill="#14532d" font-size="10" font-weight="700">06  PRE-DOCKING ANALYSIS</text>
  <text x="148" y="590" fill="#16a34a" font-size="9">Hub target bar chart (compound degree)</text>
  <text x="148" y="604" fill="#16a34a" font-size="9">UpSet plot — shared target intersections</text>
  <text x="148" y="618" fill="#16a34a" font-size="9">Heatmap — compound × target binding probability</text>
  <text x="148" y="632" fill="#16a34a" font-size="9">DGIdb drug–gene cross-validation (DrugBank · ChEMBL · TTD)</text>
  <text x="148" y="646" fill="#16a34a" font-size="9.5" font-weight="600">→ Docking_Candidates_Ranked.csv</text>
  <text x="580" y="658" text-anchor="end" fill="#86efac" font-size="9" font-style="italic">06_predocking_analysis/</text>

  <line x1="360" y1="672" x2="360" y2="689" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>

  <!-- Future -->
  <rect x="80" y="691" width="260" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="210" y="712" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">[ FUTURE ]  MOLECULAR DOCKING</text>
  <text x="210" y="727" text-anchor="middle" fill="#94a3b8" font-size="9">AutoDock Vina · GNINA · PyMOL</text>

  <line x1="340" y1="716" x2="378" y2="716" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>

  <rect x="380" y="691" width="260" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="510" y="712" text-anchor="middle" fill="#64748b" font-size="10" font-weight="700">[ FUTURE ]  MOLECULAR DYNAMICS</text>
  <text x="510" y="727" text-anchor="middle" fill="#94a3b8" font-size="9">GROMACS · AMBER</text>

  <!-- Legend -->
  <rect x="80" y="758" width="560" height="50" rx="6" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="776" fill="#64748b" font-size="9" font-weight="600">LEGEND</text>
  <rect x="160" y="764" width="12" height="12" rx="2" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="177" y="775" fill="#64748b" font-size="9">Setup</text>
  <rect x="220" y="764" width="12" height="12" rx="2" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="237" y="775" fill="#64748b" font-size="9">Data prep</text>
  <rect x="295" y="764" width="12" height="12" rx="2" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="312" y="775" fill="#64748b" font-size="9">Targets</text>
  <rect x="365" y="764" width="12" height="12" rx="2" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="382" y="775" fill="#64748b" font-size="9">Networks</text>
  <rect x="445" y="764" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#86efac"/>
  <text x="462" y="775" fill="#64748b" font-size="9">Pre-docking</text>
  <rect x="535" y="764" width="12" height="12" rx="2" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="3,2"/>
  <text x="552" y="775" fill="#64748b" font-size="9">Future</text>
  <text x="360" y="798" text-anchor="middle" fill="#94a3b8" font-size="8.5">Each step outputs to its own folder · USE_EXAMPLE_DATA = TRUE to run with bundled Sphaeralcea angustifolia data</text>
</svg>
